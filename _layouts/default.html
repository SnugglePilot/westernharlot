<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ site.title }} — 2024 Subaru Crosstrek Wilderness</title>
<meta name="description" content="{{ site.description }}">
<meta property="og:title" content="{{ site.title }}">
<meta property="og:description" content="{{ site.description }}">
<meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/{{ site.data.hero.image }}">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇨🇦</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

<div style="background:#0a0a0c;overflow-x:hidden;">

  <!-- ================= NAV ================= -->
  <div class="nav" style="position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:16px 40px;background:rgba(10,10,12,.82);backdrop-filter:blur(10px);border-bottom:1px solid #1e1e24;">
    <a href="#top" style="display:flex;align-items:center;gap:12px;font-family:'Space Mono',monospace;font-size:14px;letter-spacing:.28em;color:#f4f2ee;white-space:nowrap;">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:21px;flex:none;font-size:20px;line-height:1;overflow:hidden;border-radius:2px;">{{ site.data.site.badge }}</span>
      {{ site.data.site.name }}
    </a>
    <div class="nav-links" style="display:flex;gap:30px;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.2em;color:#c9c7c2;text-transform:uppercase;">
      {% for item in site.data.site.nav %}<a href="{{ item.href }}" style="white-space:nowrap;">{{ item.label }}</a>{% endfor %}
    </div>
  </div>

{{ content }}

  <!-- ================= FOOTER ================= -->
  <div class="pad" style="border-top:1px solid #1e1e24;padding:50px 40px;">
    <div style="max-width:1240px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;">
      <div style="display:flex;align-items:center;gap:12px;font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.24em;color:#f4f2ee;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:21px;flex:none;font-size:20px;line-height:1;overflow:hidden;border-radius:2px;">{{ site.data.site.badge }}</span>
        {{ site.data.site.name }}
      </div>
      <div style="font-family:'Space Mono',monospace;font-size:12px;color:#8a8a92;letter-spacing:.1em;">{{ site.data.site.footer_line }}</div>
    </div>
  </div>

</div>

<script src="assets/js/catalogue.js"></script>
</body>
</html>
